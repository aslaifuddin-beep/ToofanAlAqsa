name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        type: choice
        default: 'release'
        options:
          - release
          - development
      apk_name:
        description: 'Custom APK filename (optional)'
        type: string
        default: ''

env:
  UNITY_VERSION: 2022.3.20f1
  APK_NAME: ${{ inputs.apk_name || 'ToofanAlAqsa_FPS' }}

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Restore Library Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ env.UNITY_VERSION }}-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-Android-
            Library-${{ env.UNITY_VERSION }}-

      - name: Build APK
        uses: game-ci/unity-builder@v4
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: BuildHelper.CI_Build
          allowDirtyBuild: false
          versioning: Semantic
          androidAppBundle: false
          androidKeystoreName: ${{ secrets.ANDROID_KEYSTORE_NAME }}
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}
          serial: ${{ secrets.UNITY_SERIAL }}

      - name: List build output
        run: |
          echo "=== Build output ==="
          find build/ -name "*.apk" -ls 2>/dev/null || echo "No APK found in build/"
          find . -path ./.git -prune -o -name "*.apk" -print -ls 2>/dev/null || echo "No APK found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}-Android
          path: |
            build/**/*.apk
            Builds/*.apk
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/**/*.apk
            Builds/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: false
