name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  UNITY_VERSION: 2022.3.20f1

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Restore Library Cache
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ env.UNITY_VERSION }}-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-Android-
            Library-${{ env.UNITY_VERSION }}-

      - name: Build APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          buildMethod: BuildHelper.CI_Build
          versioning: Semantic
          androidExportType: androidPackage
          androidSymbolType: none
          allowDirtyBuild: true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToofanAlAqsa-Android-APK
          path: |
            build/**/*.apk
            Builds/**/*.apk
            **/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Build Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/*.log
          if-no-files-found: ignore
          retention-days: 7
