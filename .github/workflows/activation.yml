name: Acquire Unity License

on:
  workflow_dispatch:

jobs:
  get-license:
    name: Instructions to get .ulf license file
    runs-on: ubuntu-latest
    steps:
      - name: Show instructions
        run: |
          echo "========================================="
          echo "  HOW TO GET YOUR UNITY LICENSE FILE"
          echo "========================================="
          echo ""
          echo "1. Open Unity Hub on your PC"
          echo "2. Go to Preferences > Licenses"
          echo "3. Ensure Personal License is activated"
          echo "4. Open this file with Notepad:"
          echo "   C:\ProgramData\Unity\Unity_lic.ulf"
          echo "5. Copy ALL the text inside"
          echo "6. Add as GitHub Secret 'UNITY_LICENSE'"
          echo ""
          echo "Or run Build Android APK workflow directly"
